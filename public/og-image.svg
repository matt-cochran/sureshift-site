<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent glow -->
  <circle cx="600" cy="315" r="300" fill="url(#glow)"/>

  <!-- Shield icon -->
  <g transform="translate(540, 140)">
    <path d="M60 10 L10 35 L10 85 C10 125 60 155 60 155 C60 155 110 125 110 85 L110 35 Z"
          fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.8"/>
    <polyline points="40,90 55,105 80,75"
             fill="none" stroke="#06b6d4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand name -->
  <text x="600" y="340" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="64" fill="#e8ecf4">
    SureShift
  </text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="28" fill="#94a3b8">
    Production Readiness Assurance
  </text>

  <!-- Sub-tagline -->
  <text x="600" y="445" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="20" fill="#64748b">
    Free CLI scan for lean SaaS teams
  </text>

  <!-- Terminal mockup snippet -->
  <g transform="translate(350, 480)">
    <rect width="500" height="80" rx="8" fill="#111827" stroke="#252f45" stroke-width="1"/>
    <circle cx="20" cy="16" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="38" cy="16" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="56" cy="16" r="5" fill="#10b981" opacity="0.8"/>
    <text x="20" y="50" font-family="JetBrains Mono, monospace" font-size="14" fill="#06b6d4">$</text>
    <text x="35" y="50" font-family="JetBrains Mono, monospace" font-size="14" fill="#94a3b8">sureshift scan --env production</text>
    <text x="20" y="68" font-family="JetBrains Mono, monospace" font-size="12" fill="#10b981">&#x2713; Score: 68/100 &middot; Report ready</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="200" y="620" width="800" height="2" rx="1" fill="#06b6d4" opacity="0.3"/>
</svg>
